# Lefthook configuration
# https://github.com/evilmartians/lefthook

# Use this as a formatter
# https://dprint.dev/
# formatter:
#   name: dprint
#   includes:
#     - "*.ts"
#     - "*.tsx"
#     - "*.js"
#     - "*.jsx"
#     - "*.json"

# Run formatter and linter on pre-commit
pre-commit:
  parallel: false
  commands:
    format:
      run: pnpm --filter web format && git add -A
    lint:
      run: pnpm --filter web lint

# Run all checks on commit-msg (optional - good for CI-like checks)
# commit-msg:
#   commands:
#     commitlint:
#       run: pnpm commitlint --edit {1}

# Run all checks before push
pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm --filter web tsc --noEmit

# Example of custom command
# test:
#   commands:
#     test:
#       run: pnpm test
